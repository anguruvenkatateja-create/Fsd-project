<!DOCTYPE html>
<html>
<head>
    <title>Hostel Complaints</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .admin-nav { text-align: right; margin-bottom: 10px; }
        input, textarea { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-nav">
            <a href="{{ url_for('admin_login') }}">Admin Login</a>
        </div>
        <h1>Hostel Complaint Form</h1>
        <form action="/submit_complaint" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="text" name="room" placeholder="Room Number" required>
            <textarea name="issue" placeholder="Describe the problem..." required></textarea>
            <button type="submit">Submit</button>
        </form>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}<p class="{{ cat }}">{{ msg }}</p>{% endfor %}
            {% endif %}
        {% endwith %}
    </div>
</body>
</html>
